<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar" role="navigation">

        <h2>AdminPanel</h2>

        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Ventas</a></li>
                <li><a href="#">Usuarios</a></li>
                <li><a href="#">Reportes</a></li>
                <li><a href="#">Configuración</a></li>
            </ul>
        </nav>

    </aside>

    <!-- Header -->
    <header class="header">

        <h1>Dashboard de Ventas</h1>

        <input type="text" placeholder="Buscar...">

    </header>

    <!-- Main -->
    <main class="main" role="main">

        <!-- Cards -->
        <section class="cards">

            <div class="card">
                <h3>Ventas</h3>
                <p>$12.500</p>
            </div>

            <div class="card">
                <h3>Usuarios</h3>
                <p>1.250</p>
            </div>

            <div class="card">
                <h3>Pedidos</h3>
                <p>320</p>
            </div>

        </section>

        <!-- Tabla -->
        <section class="table-section">

            <h2>Últimas Ventas</h2>

            <table>

                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Estado</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>Samuel</td>
                        <td>Laptop</td>
                        <td>Completado</td>
                    </tr>

                    <tr>
                        <td>Laura</td>
                        <td>Mouse</td>
                        <td>Pendiente</td>
                    </tr>

                    <tr>
                        <td>Carlos</td>
                        <td>Teclado</td>
                        <td>Enviado</td>
                    </tr>

                </tbody>

            </table>

        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">

        <p>Dashboard Administrativo 2026</p>

    </footer>

</div>

</body>
</html>
